<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physynex | Coming Soon</title>
  <meta name="description" content="Physynex is launching soon. Stay tuned for a smarter future in health innovation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #071318;
      --bg-2: #0c1f26;
      --card: rgba(14, 38, 46, 0.58);
      --text: #e9f8fb;
      --muted: #a7c7cf;
      --brand: #19d2c3;
      --brand-2: #6ee7d8;
      --line: rgba(110, 231, 216, 0.2);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, rgba(25, 210, 195, 0.2), transparent 33%),
        radial-gradient(circle at 86% 90%, rgba(110, 231, 216, 0.18), transparent 28%),
        linear-gradient(130deg, var(--bg), var(--bg-2));
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.14;
      background-image: radial-gradient(#ffffff 0.45px, transparent 0.45px);
      background-size: 4px 4px;
      mix-blend-mode: soft-light;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.35;
      animation: float 9s ease-in-out infinite;
    }

    .orb.one {
      width: 240px;
      height: 240px;
      top: -60px;
      right: -40px;
      background: #19d2c3;
    }

    .orb.two {
      width: 170px;
      height: 170px;
      bottom: 7%;
      left: -50px;
      background: #6ee7d8;
      animation-delay: -3s;
    }

    .wrap {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(860px, 100%);
      position: relative;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(9px);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4.5vw, 46px);
      text-align: center;
      animation: rise 0.85s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    .logo {
      width: clamp(92px, 18vw, 132px);
      aspect-ratio: 1;
      margin: 0 auto 20px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 12px 30px rgba(25, 210, 195, 0.24);
      object-fit: cover;
      animation: pop 0.7s ease both 0.2s;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--line);
      color: var(--brand-2);
      border-radius: 999px;
      padding: 8px 14px;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
      text-transform: uppercase;
      margin-bottom: 14px;
      animation: rise 0.7s ease both 0.26s;
    }

    h1 {
      font-family: "Sora", sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
      animation: rise 0.7s ease both 0.32s;
    }

    h1 span {
      color: var(--brand);
      text-shadow: 0 0 20px rgba(25, 210, 195, 0.38);
    }

    p {
      color: var(--muted);
      max-width: 640px;
      margin: 0 auto;
      font-size: clamp(1rem, 2.3vw, 1.13rem);
      line-height: 1.65;
      animation: rise 0.7s ease both 0.4s;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--line), transparent);
      margin: clamp(22px, 4vw, 30px) 0;
      animation: rise 0.7s ease both 0.46s;
    }

    .signup {
      margin-top: 20px;
      animation: rise 0.7s ease both 0.48s;
    }

    .signup-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-width: 560px;
      margin: 0 auto;
    }

    .signup input[type="email"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(9, 28, 35, 0.85);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .signup input[type="email"]::placeholder {
      color: #86aeb8;
    }

    .signup input[type="email"]:focus {
      border-color: rgba(110, 231, 216, 0.55);
      box-shadow: 0 0 0 3px rgba(25, 210, 195, 0.14);
    }

    .signup button {
      border: 1px solid transparent;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #082126;
      font-family: "Sora", sans-serif;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .signup button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    .signup-note {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #92bac3;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(64px, 1fr));
      gap: 12px;
      animation: rise 0.7s ease both 0.52s;
    }

    .time {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 8px;
      background: rgba(9, 28, 35, 0.7);
    }

    .time strong {
      display: block;
      font-family: "Sora", sans-serif;
      font-size: clamp(1.2rem, 3.6vw, 2rem);
      color: var(--brand-2);
      line-height: 1;
      margin-bottom: 6px;
    }

    .time span {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .footer {
      margin-top: clamp(16px, 3vw, 22px);
      font-size: 0.82rem;
      color: #8fb7bf;
      animation: rise 0.7s ease both 0.58s;
    }

    @keyframes rise {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes pop {
      from {
        transform: scale(0.88);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(16px) translateX(-10px); }
    }

    @media (max-width: 600px) {
      body { overflow-y: auto; }
      .signup-row { grid-template-columns: 1fr; }
      .timer { gap: 10px; }
      .time { padding: 12px 8px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="wrap">
    <div class="orb one" aria-hidden="true"></div>
    <div class="orb two" aria-hidden="true"></div>

    <main class="panel">
      <img class="logo" src="logo.jpeg" alt="Physynex Logo" />
      <!-- <div class="badge">Physynex</div> -->
      <h1>We Are <span>Launching Soon</span></h1>
      <p>
        A new experience for modern health innovation is almost here.
        Physynex is getting ready to go live with something powerful, precise, and patient-centered.
      </p>

      <form class="signup" action="https://formspree.io/f/xykdbnjj" method="POST">
        <input type="hidden" name="_subject" value="Physynex Coming Soon Signup" />
        <div class="signup-row">
          <input
            type="email"
            name="email"
            placeholder="Enter your email for launch updates"
            autocomplete="email"
            required
          />
          <button type="submit">Notify Me</button>
        </div>
        <p class="signup-note">Get launch updates directly in your inbox.</p>
      </form>

      <div class="divider" aria-hidden="true"></div>

      <section class="timer" aria-label="Launch countdown">
        <div class="time"><strong id="days">00</strong><span>Days</span></div>
        <div class="time"><strong id="hours">00</strong><span>Hours</span></div>
        <div class="time"><strong id="minutes">00</strong><span>Minutes</span></div>
        <div class="time"><strong id="seconds">00</strong><span>Seconds</span></div>
      </section>

      <div class="footer">© <span id="year"></span> Physynex. All rights reserved.</div>
    </main>
  </div>

  <script>
    const launchDate = new Date("2026-12-01T00:00:00").getTime();

    const format = (n) => String(n).padStart(2, "0");

    const update = () => {
      const now = Date.now();
      const diff = launchDate - now;

      if (diff <= 0) {
        document.getElementById("days").textContent = "00";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").textContent = format(days);
      document.getElementById("hours").textContent = format(hours);
      document.getElementById("minutes").textContent = format(minutes);
      document.getElementById("seconds").textContent = format(seconds);
    };

    document.getElementById("year").textContent = new Date().getFullYear();
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
